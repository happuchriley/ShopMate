# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect github.com/happuchriley/ShopMate

databases:
  - name: shopmate-db
    plan: free
    databaseName: shopmate
    user: shopmate

services:
  - type: web
    name: shopmate
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopmate-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: DEFAULT_BUSINESS_ID
        value: techlink_mobile
      - key: DEFAULT_TIMEZONE
        value: Africa/Accra
      - key: DIGEST_HOUR
        value: "8"
      - key: DIGEST_MINUTE
        value: "0"

faq:
  - q: Where are you located?
    a: We are at Osu Oxford Street, Accra — near Danquah Circle. Landmark is the blue TechLink sign.
  - q: Do you accept trade-ins?
    a: Yes! Bring your old phone for a free valuation. Trade-in value applies toward your purchase.
  - q: How long do repairs take?
    a: Most screen and battery repairs are done same day (1–3 hours). Complex repairs may take 24–48 hours.
  - q: Do you deliver?
    a: Yes, delivery within Accra is GHS 30. Payment on delivery or Mobile Money upfront.
  - q: Are your used phones original?
    a: All our used devices are tested for authenticity. We check IMEI, battery, cameras, and sensors before sale.
  - q: What payment methods do you accept?
    a: Cash, MTN MoMo, Vodafone Cash, AirtelTigo Money, and bank transfer.
  - q: Me pɛ iPhone — wo wɔ a?
    a: Aane! Yɛwɔ iPhone 12, 13, ne foforɔ. Fa wo budget ma me na mɛkyerɛ wo options.
  - q: Screenn no atwam — ɛyɛ sɛn?
    a: Fa phone no bra. Screen repair fi GHS 150. Yɛtumi ayɛ no da no ara ma iPhone ne Samsung a ɛyɛ common.

